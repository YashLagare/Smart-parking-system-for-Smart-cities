version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: smartpark-db
    restart: always
    environment:
      POSTGRES_USER: smartpark_admin
      POSTGRES_PASSWORD: SmartParkSecurePassword2026!
      POSTGRES_DB: smartpark_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartpark_admin -d smartpark_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7-alpine
    container_name: smartpark-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: smartpark-ai
    restart: always
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    depends_on:
      - db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartpark-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://smartpark_admin:SmartParkSecurePassword2026!@db:5432/smartpark_db?schema=public
      - REDIS_URL=redis://cache:6379
      - JWT_SECRET=SmartParkSecretJWTTokenKey2026!@#$
      - AI_SERVICE_URL=http://ai-service:8000
      - PORT=5000
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartpark-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
      - NEXT_PUBLIC_AI_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
